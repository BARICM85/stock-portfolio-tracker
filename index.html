<!DOCTYPE html>
<html>
<head>
    <title>Stock Portfolio Tracker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
        <meta name="theme-color" content="#111827">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Excel Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <div class="sidebar">

        <h1>📊 Portfolio</h1>

        <!-- User Profile -->
        <div id="profile" class="profile"></div>

        <!-- Navigation -->
        <button onclick="showDashboard()">Dashboard</button>
        <button onclick="showPortfolio()">Portfolio</button>
        <button onclick="showAddStock()">Add Stock</button>
        <button onclick="showUpload()">Upload Excel</button>
        <button onclick="showAllocation()">Allocation</button>
        <button onclick="showBenchmark()">Benchmark</button>
        <button onclick="showRisk()">Risk</button>
        <button onclick="downloadExcel()">Download Excel</button>
        <button onclick="switchPortfolio('portfolioA')">Portfolio A</button>
        <button onclick="switchPortfolio('portfolioB')">Portfolio B</button>
        <button onclick="handleExcelUpload('portfolioA')">Upload A</button>
        <button onclick="handleExcelUpload('portfolioB')">Upload B</button>
        <button onclick="showUpload('portfolioA')">Upload Excel A</button>
        <button onclick="showUpload('portfolioB')">Upload Excel B</button>
        <button onclick="deleteStock('portfolioA', 0)">

        <hr style="margin:15px 0; border-color:#333;">

        <!-- Auth Buttons -->
        <button onclick="googleLogin()" id="loginBtn">
            Login with Google
        </button>

        <button onclick="logout()" id="logoutBtn" style="display:none;">
            Logout
        </button>

    </div>

    <div class="main">
        <div id="content"></div>
    </div>

    <!-- Toast -->
    <div id="toast"
         style="position:fixed;bottom:20px;right:20px;
                background:#111;color:white;
                padding:10px 15px;border-radius:6px;
                display:none;">
    </div>

    <!-- Your App Script -->
    <script type="module" src="app.js"></script>

    <div id="toast"
     style="position:fixed;bottom:20px;right:20px;
            background:#111;color:white;
            padding:12px 16px;border-radius:6px;
            display:none;z-index:9999;">
</div>
</body>
</html>
